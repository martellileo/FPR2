<p-table [value]="(vendas$ | async)!" stripedRows [paginator]="true" [rows]="10">

    <ng-template #caption>
        <div class="flex items-center justify-between">
            <span class="text-xl font-bold">Lista de Vendas</span>
        </div>
    </ng-template>
    <ng-template #header>
        <tr>
            <th>Codigo</th>
            <th>Data</th>
            <th>Cliente</th>
        </tr>
    </ng-template>
    <ng-template #body let-venda>
        <tr>
            <td> {{ venda.codigo }} </td>
            <td> {{ venda.data }} </td>
            <td> {{ venda.cliente }} </td>
        </tr>
    </ng-template>

</p-table>
