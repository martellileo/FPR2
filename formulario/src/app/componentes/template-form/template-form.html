<p>template-form works!</p>


<form #f="ngForm" (ngSubmit)="salvar(f)">
    <label>
        Nome: 
        <input 
            type="text" 
            name="nome"
            [(ngModel)]="pessoa.nome"
            minlength="3"
            required
            #nomeInput="ngModel"
        />

        <div>
            @if(nomeInput.errors?.['required'] && nomeInput.dirty){
                <small>Nome é obrigatório.</small>
            }
            @if(nomeInput.errors?.['minlength']){
                <small>Deve conter no minimo 3 caracteres.</small>
            }
            <!-- {{ nomeInput.errors?.['required'] | json}} -->
        </div>
    </label>

    <label>
        Email: 
        <input 
            type="text" 
            name="email"
            [(ngModel)]="pessoa.email"
            required
            #emailInput="ngModel"
            [email]="true"
        />

        <div>
            @if(emailInput.errors?.['required'] && emailInput.dirty){
                <small>Email é obrigatório.</small>
            }
            @if(emailInput.errors?.['email'] && emailInput.dirty){
                <small>Campo deve conter um email.</small>
            }
        </div>
    </label>

    <div>

    </div>

    <button type="submit" [disabled]="f.invalid"> Salvar</button>
</form>
