<form (ngSubmit)="login()">
  <div>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" [(ngModel)]="email" />
  </div>
  <div>
    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha" [(ngModel)]="senha" />
  </div>
  <button type="submit">Login</button>
</form>
